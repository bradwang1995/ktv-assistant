name = "ktv-assistant-room"
main = "worker/index.ts"
compatibility_date = "2026-06-23"
workers_dev = false
preview_urls = false

[vars]
YOUTUBE_SEARCH_DAILY_LIMIT = "100"
YOUTUBE_SEARCH_MAX_CALLS_PER_FILL = "1"
SEARCH_CACHE_TTL_DAYS = "365"
SEARCH_CACHE_MAX_ENTRY_BYTES = "524288"
SEARCH_RATE_LIMIT_PER_MINUTE = "20"

[[d1_databases]]
binding = "DB"
database_name = "ktv-assistant-db"
database_id = "a2fe987b-5191-4ac3-9d01-f923d19c731a"

[[kv_namespaces]]
binding = "SEARCH_CACHE"
id = "aedd751919314f9e81f1917e59a859bd"

[[durable_objects.bindings]]
name = "ROOM_OBJECT"
class_name = "RoomDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject"]
